<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/UyC7wbr.png" />
  <link rel="apple-touch-icon" href="https://i.imgur.com/UyC7wbr.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nova AI" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 1rem;
      background: #1a1a1a;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .user {
      background: #2f6feb;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .ai {
      background: #1e1e1e;
      border: 1px solid #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 0.5rem;
      display: block;
    }
    #input-area {
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 0.5rem;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }
    #preview-area {
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    #preview-area img {
      height: 60px;
      border-radius: 8px;
      border: 1px solid #444;
    }
    #remove-img {
      background: #444;
      border: none;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #bottom-row {
      display: flex;
      gap: 0.5rem;
    }
    textarea {
      flex: 1;
      padding: 0.75rem;
      border-radius: 12px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #f0f0f0;
      font-size: 1rem;
      resize: none;
      height: 52px;
      font-family: 'Inter', system-ui, sans-serif;
    }
    button {
      padding: 0 1.25rem;
      border-radius: 12px;
      border: none;
      background: #2f6feb;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    #upload-btn {
      background: #2a2a2a;
      border: 1px solid #444;
      font-size: 1.3rem;
      padding: 0 1rem;
    }
    #upload-btn:hover { background: #333; }
  </style>
</head>
<body>
  <header>🌟 AI Chat by Jackson Weimer</header>
  <div id="chat"></div>
  <div id="input-area">
    <div id="preview-area">
      <img id="preview-img" src="" alt="preview" />
      <button id="remove-img">✕</button>
    </div>
    <div id="bottom-row">
      <button id="upload-btn" title="Upload image or take photo">📎</button>
      <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" />
      <textarea id="input" placeholder="Type a message..."></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://nova-ai.onrender.com";

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const btn = document.getElementById("send");
    const fileInput = document.getElementById("file-input");
    const uploadBtn = document.getElementById("upload-btn");
    const previewArea = document.getElementById("preview-area");
    const previewImg = document.getElementById("preview-img");
    const removeImg = document.getElementById("remove-img");

    const history = [];
    let pendingImageBase64 = null;
    let pendingImageType = null;

    // Greeting on load
    window.addEventListener("load", () => {
      const greeting = "Hi, I'm Nova, your personal AI assistant made by Jackson Weimer. How can I help you?";
      addMsg("ai", greeting);
      history.push({ role: "assistant", content: greeting });
    });

    uploadBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const result = e.target.result;
        pendingImageBase64 = result.split(",")[1];
        pendingImageType = file.type;
        previewImg.src = result;
        previewArea.style.display = "flex";
      };
      reader.readAsDataURL(file);
    });

    removeImg.addEventListener("click", () => {
      pendingImageBase64 = null;
      pendingImageType = null;
      previewArea.style.display = "none";
      previewImg.src = "";
      fileInput.value = "";
    });

    function addMsg(role, text, imgSrc = null) {
      const div = document.createElement("div");
      div.className = `msg ${role === "user" ? "user" : "ai"}`;
      if (imgSrc) {
        const img = document.createElement("img");
        img.src = imgSrc;
        div.appendChild(img);
      }
      if (text) {
        const p = document.createElement("span");
        p.textContent = text;
        div.appendChild(p);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text && !pendingImageBase64) return;

      const imgSrc = pendingImageBase64 ? `data:${pendingImageType};base64,${pendingImageBase64}` : null;
      addMsg("user", text, imgSrc);

      // Build message content for API
      const userContent = [];
      if (pendingImageBase64) {
        userContent.push({
          type: "image_url",
          image_url: { url: `data:${pendingImageType};base64,${pendingImageBase64}` }
        });
      }
      if (text) userContent.push({ type: "text", text });

      history.push({ role: "user", content: userContent.length === 1 && userContent[0].type === "text" ? text : userContent });

      input.value = "";
      pendingImageBase64 = null;
      pendingImageType = null;
      previewArea.style.display = "none";
      previewImg.src = "";
      fileInput.value = "";
      btn.disabled = true;

      const thinking = document.createElement("div");
      thinking.className = "msg ai";
      thinking.textContent = "Thinking...";
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch(`${BACKEND_URL}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        thinking.textContent = data.reply || data.error || "Something went wrong.";
        if (data.reply) history.push({ role: "assistant", content: data.reply });
      } catch {
        thinking.textContent = "Error reaching the server. Is your backend running?";
      }

      btn.disabled = false;
    }

    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
