<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova AI</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/UyC7wbr.png" />
  <link rel="apple-touch-icon" href="https://i.imgur.com/UyC7wbr.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nova AI" />
  <meta property="og:title" content="Nova AI" />
  <meta property="og:description" content="Your personal AI assistant for your school Chromebook." />
  <meta property="og:image" content="https://i.imgur.com/UyC7wbr.png" />
  <meta property="og:url" content="https://nova-ai-mk9x.onrender.com" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://i.imgur.com/UyC7wbr.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #2a2a2a;
      --border: #333;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #2f6feb;
      --ai-bg: #1e1e1e;
    }
    .light {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface2: #ececec;
      --border: #ddd;
      --text: #111;
      --text-muted: #666;
      --accent: #2f6feb;
      --ai-bg: #e8e8e8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    header {
      padding: 0.75rem 1rem;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .header-title { font-size: 1.1rem; font-weight: 600; }
    .header-btns { display: flex; gap: 0.5rem; }
    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      font-size: 1rem;
    }
    .icon-btn:hover { opacity: 0.8; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.ai { align-items: flex-start; }
    .msg {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .user .msg {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .ai .msg {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg img { max-width: 100%; border-radius: 10px; margin-top: 0.5rem; display: block; }
    .msg-actions { display: flex; gap: 0.4rem; }
    .msg-action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
    }
    .msg-action-btn:hover { background: var(--surface2); color: var(--text); }
    #input-area {
      display: flex;
      flex-direction: column;
      padding: 1rem;
      gap: 0.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #preview-area {
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    #preview-area img { height: 60px; border-radius: 8px; border: 1px solid var(--border); }
    #remove-img {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #bottom-row { display: flex; gap: 0.5rem; }
    textarea {
      flex: 1;
      padding: 0.75rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1rem;
      resize: none;
      height: 52px;
      font-family: 'Inter', system-ui, sans-serif;
    }
    button {
      padding: 0 1.25rem;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .tool-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      padding: 0 0.9rem;
      border-radius: 12px;
      cursor: pointer;
    }
    .tool-btn:hover { opacity: 0.8; }
    .tool-btn.recording { background: #e03; color: white; border-color: #e03; }
    #sidebar {
      position: fixed;
      top: 0; left: -280px;
      width: 280px;
      height: 100%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 100;
      transition: left 0.25s;
      display: flex;
      flex-direction: column;
    }
    #sidebar.open { left: 0; }
    #sidebar-header {
      padding: 1rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }
    #clear-all-btn {
      background: #c0392b;
      border: none;
      color: white;
      border-radius: 8px;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    #clear-all-btn:hover { opacity: 0.8; }
    #sidebar-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .history-item-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      padding: 0.6rem 0.4rem;
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--text);
    }
    .history-item-title:hover { background: var(--surface2); }
    .delete-chat-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.3rem 0.5rem;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .delete-chat-btn:hover { background: #c0392b; color: white; }
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 99;
    }
    #overlay.show { display: block; }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text);
      margin-left: 2px;
      animation: blink 0.7s infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      💬 Chat History
      <div style="display:flex;gap:0.5rem;align-items:center">
        <button id="clear-all-btn">🗑️ Clear All</button>
        <button class="icon-btn" id="close-sidebar">✕</button>
      </div>
    </div>
    <div id="sidebar-list"></div>
  </div>
  <div id="overlay"></div>

  <header>
    <button class="icon-btn" id="history-btn" title="Chat history">💬</button>
    <span class="header-title">🌟 Nova AI by Jackson Weimer</span>
    <div class="header-btns">
      <button class="icon-btn" id="clear-btn" title="Clear chat">🗑️</button>
      <button class="icon-btn" id="theme-btn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div id="chat"></div>

  <div id="input-area">
    <div id="preview-area">
      <img id="preview-img" src="" alt="preview" />
      <button id="remove-img">✕</button>
    </div>
    <div id="bottom-row">
      <button class="tool-btn" id="upload-btn" title="Upload image">📎</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
      <button class="tool-btn" id="mic-btn" title="Voice input">🎤</button>
      <textarea id="input" placeholder="Type a message..."></textarea>
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://nova-ai-mk9x.onrender.com";

    const chatEl = document.getElementById("chat");
    const input = document.getElementById("input");
    const btn = document.getElementById("send");
    const fileInput = document.getElementById("file-input");
    const uploadBtn = document.getElementById("upload-btn");
    const previewArea = document.getElementById("preview-area");
    const previewImg = document.getElementById("preview-img");
    const removeImg = document.getElementById("remove-img");
    const themeBtn = document.getElementById("theme-btn");
    const clearBtn = document.getElementById("clear-btn");
    const micBtn = document.getElementById("mic-btn");
    const historyBtn = document.getElementById("history-btn");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const closeSidebar = document.getElementById("close-sidebar");
    const sidebarList = document.getElementById("sidebar-list");
    const clearAllBtn = document.getElementById("clear-all-btn");

    let history = [];
    let pendingImageBase64 = null;
    let pendingImageType = null;
    let isLight = false;
    let recognition = null;
    let isRecording = false;
    let savedChats = JSON.parse(localStorage.getItem("nova_chats") || "[]");
    let currentChatId = Date.now().toString();

    // Keep Render awake
    setInterval(() => fetch(`${BACKEND_URL}/`), 10 * 60 * 1000);

    // Theme
    themeBtn.addEventListener("click", () => {
      isLight = !isLight;
      document.body.classList.toggle("light", isLight);
      themeBtn.textContent = isLight ? "☀️" : "🌙";
    });

    // Clear current chat
    clearBtn.addEventListener("click", () => {
      saveCurrentChat();
      history = [];
      chatEl.innerHTML = "";
      currentChatId = Date.now().toString();
      addGreeting();
    });

    // Clear all history
    clearAllBtn.addEventListener("click", () => {
      if (!confirm("Delete all chat history? This can't be undone.")) return;
      savedChats = [];
      localStorage.setItem("nova_chats", "[]");
      renderSidebar();
    });

    // Sidebar
    historyBtn.addEventListener("click", () => {
      saveCurrentChat();
      renderSidebar();
      sidebar.classList.add("open");
      overlay.classList.add("show");
    });
    closeSidebar.addEventListener("click", closeSidebarFn);
    overlay.addEventListener("click", closeSidebarFn);
    function closeSidebarFn() {
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    }

    function saveCurrentChat() {
      if (history.length <= 1) return;
      const firstUserMsg = history.find(m => m.role === "user");
      const title = firstUserMsg
        ? (typeof firstUserMsg.content === "string" ? firstUserMsg.content : "Image message").slice(0, 40)
        : "Chat";
      const existing = savedChats.findIndex(c => c.id === currentChatId);
      const chat = { id: currentChatId, title, history, date: Date.now() };
      if (existing >= 0) savedChats[existing] = chat;
      else savedChats.unshift(chat);
      localStorage.setItem("nova_chats", JSON.stringify(savedChats));
    }

    function renderSidebar() {
      savedChats = JSON.parse(localStorage.getItem("nova_chats") || "[]");
      sidebarList.innerHTML = savedChats.length === 0
        ? `<p style="padding:1rem;color:var(--text-muted);font-size:0.9rem">No saved chats yet</p>`
        : savedChats.map(c => `
            <div class="history-item" data-id="${c.id}">
              <span class="history-item-title">${c.title}</span>
              <button class="delete-chat-btn" data-id="${c.id}">✕</button>
            </div>`).join("");

      sidebarList.querySelectorAll(".history-item-title").forEach(el => {
        el.addEventListener("click", () => {
          const c = savedChats.find(x => x.id === el.closest(".history-item").dataset.id);
          if (!c) return;
          history = c.history;
          currentChatId = c.id;
          chatEl.innerHTML = "";
          history.forEach(m => {
            if (m.role !== "system") addMsg(m.role, typeof m.content === "string" ? m.content : "[image message]");
          });
          closeSidebarFn();
        });
      });

      sidebarList.querySelectorAll(".delete-chat-btn").forEach(el => {
        el.addEventListener("click", e => {
          e.stopPropagation();
          savedChats = savedChats.filter(c => c.id !== el.dataset.id);
          localStorage.setItem("nova_chats", JSON.stringify(savedChats));
          renderSidebar();
        });
      });
    }

    // Greeting
    function addGreeting() {
      const greeting = "Hi, I'm Nova, your personal AI assistant for your school Chromebook. How can I help you?";
      addMsg("ai", greeting);
      history.push({ role: "assistant", content: greeting });
    }
    window.addEventListener("load", addGreeting);

    // Image upload
    uploadBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const result = e.target.result;
        pendingImageBase64 = result.split(",")[1];
        pendingImageType = file.type;
        previewImg.src = result;
        previewArea.style.display = "flex";
      };
      reader.readAsDataURL(file);
    });
    removeImg.addEventListener("click", clearImage);
    function clearImage() {
      pendingImageBase64 = null;
      pendingImageType = null;
      previewArea.style.display = "none";
      previewImg.src = "";
      fileInput.value = "";
    }

    // Voice input
    if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.onresult = e => {
        input.value = e.results[0][0].transcript;
        micBtn.classList.remove("recording");
        isRecording = false;
      };
      recognition.onend = () => { micBtn.classList.remove("recording"); isRecording = false; };
    }
    micBtn.addEventListener("click", () => {
      if (!recognition) return alert("Voice input not supported in this browser.");
      if (isRecording) { recognition.stop(); return; }
      recognition.start();
      isRecording = true;
      micBtn.classList.add("recording");
    });

    // TTS with best available voice
    function speak(text) {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      const voices = speechSynthesis.getVoices();
      const preferred = voices.find(v =>
        ["Samantha", "Karen", "Moira", "Fiona", "Victoria", "Allison", "Ava"].includes(v.name)
      ) || voices.find(v => v.lang === "en-US" && !v.name.includes("Google")) || voices[0];
      if (preferred) utt.voice = preferred;
      utt.rate = 0.95;
      utt.pitch = 1.05;
      utt.volume = 1;
      speechSynthesis.speak(utt);
    }

    // Add message to UI
    function addMsg(role, text, imgSrc = null) {
      const wrap = document.createElement("div");
      wrap.className = `msg-wrap ${role === "user" ? "user" : "ai"}`;
      const div = document.createElement("div");
      div.className = "msg";
      if (imgSrc) {
        const img = document.createElement("img");
        img.src = imgSrc;
        div.appendChild(img);
      }
      const span = document.createElement("span");
      span.textContent = text || "";
      div.appendChild(span);
      wrap.appendChild(div);

      const actions = document.createElement("div");
      actions.className = "msg-actions";
      const copyBtn = document.createElement("button");
      copyBtn.className = "msg-action-btn";
      copyBtn.textContent = "📋 Copy";
      copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(text || "");
        copyBtn.textContent = "✅ Copied";
        setTimeout(() => copyBtn.textContent = "📋 Copy", 2000);
      });
      actions.appendChild(copyBtn);
      if (role === "ai") {
        const ttsBtn = document.createElement("button");
        ttsBtn.className = "msg-action-btn";
        ttsBtn.textContent = "🔊 Listen";
        ttsBtn.addEventListener("click", () => speak(text));
        actions.appendChild(ttsBtn);
      }
      wrap.appendChild(actions);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
      return span;
    }

    // Typing animation
    function typeText(span, text) {
      return new Promise(resolve => {
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        span.appendChild(cursor);
        let i = 0;
        const interval = setInterval(() => {
          span.insertBefore(document.createTextNode(text[i]), cursor);
          i++;
          chatEl.scrollTop = chatEl.scrollHeight;
          if (i >= text.length) {
            clearInterval(interval);
            cursor.remove();
            resolve();
          }
        }, 15);
      });
    }

    // Send message
    async function sendMessage() {
      const text = input.value.trim();
      if (!text && !pendingImageBase64) return;

      const imgSrc = pendingImageBase64 ? `data:${pendingImageType};base64,${pendingImageBase64}` : null;
      addMsg("user", text, imgSrc);

      const userContent = [];
      if (pendingImageBase64) userContent.push({ type: "image_url", image_url: { url: `data:${pendingImageType};base64,${pendingImageBase64}` } });
      if (text) userContent.push({ type: "text", text });
      history.push({ role: "user", content: userContent.length === 1 && userContent[0].type === "text" ? text : userContent });

      input.value = "";
      clearImage();
      btn.disabled = true;

      const wrap = document.createElement("div");
      wrap.className = "msg-wrap ai";
      const thinking = document.createElement("div");
      thinking.className = "msg";
      thinking.textContent = "Thinking...";
      wrap.appendChild(thinking);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;

      try {
        const res = await fetch(`${BACKEND_URL}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        const reply = data.reply || data.error || "Something went wrong.";
        thinking.innerHTML = "";
        const span = document.createElement("span");
        thinking.appendChild(span);

        const actions = document.createElement("div");
        actions.className = "msg-actions";
        const copyBtn = document.createElement("button");
        copyBtn.className = "msg-action-btn";
        copyBtn.textContent = "📋 Copy";
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(reply);
          copyBtn.textContent = "✅ Copied";
          setTimeout(() => copyBtn.textContent = "📋 Copy", 2000);
        });
        const ttsBtn = document.createElement("button");
        ttsBtn.className = "msg-action-btn";
        ttsBtn.textContent = "🔊 Listen";
        ttsBtn.addEventListener("click", () => speak(reply));
        actions.appendChild(copyBtn);
        actions.appendChild(ttsBtn);
        wrap.appendChild(actions);

        await typeText(span, reply);
        if (data.reply) history.push({ role: "assistant", content: reply });
        saveCurrentChat();
      } catch {
        thinking.textContent = "Error reaching the server. Is your backend running?";
      }

      btn.disabled = false;
    }

    // Easter egg toggle button
    const easterBtn = document.createElement("button");
    easterBtn.className = "icon-btn";
    easterBtn.title = "Toggle background";
    easterBtn.textContent = "🖼️";
    easterBtn.style.display = "none";
    document.querySelector(".header-btns").prepend(easterBtn);
    easterBtn.addEventListener("click", () => toggleEaster());

    // Easter egg
    let easterBuffer = "";
    const EASTER_CODE = "jymer1102";
    let easterActive = false;

    function toggleEaster(silent = false) {
      easterActive = !easterActive;
              document.body.style.backgroundImage = easterActive ? "url('https://i.imgur.com/9P9U3mj.jpeg')" : "";
      document.body.style.backgroundSize = easterActive ? "cover" : "";
      document.body.style.backgroundPosition = easterActive ? "center" : "";
      document.body.style.backgroundAttachment = easterActive ? "fixed" : "";
      easterBtn.style.display = "block";
    }

    function showEasterToast(msg) {
      const toast = document.createElement("div");
      toast.style.cssText = "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2f6feb;color:white;padding:0.6rem 1.2rem;border-radius:12px;font-size:0.9rem;z-index:999;animation:fadeout 3s forwards";
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Detect code typed in chat box
    input.addEventListener("input", () => {
      if (input.value.trim() === EASTER_CODE) {
        input.value = "";
        toggleEaster();
        showEasterToast("Easter egg unlocked! 🔓🎉");
      }
    });

    const style = document.createElement("style");
    style.textContent = "@keyframes fadeout { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }";
    document.head.appendChild(style);

    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
