<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/UyC7wbr.png" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 1rem;
      background: #1a1a1a;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 18px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .user {
      background: #2f6feb;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .ai {
      background: #1e1e1e;
      border: 1px solid #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    #input-area {
      display: flex;
      padding: 1rem;
      gap: 0.5rem;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }
    textarea {
      flex: 1;
      padding: 0.75rem;
      border-radius: 12px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #f0f0f0;
      font-size: 1rem;
      resize: none;
      height: 52px;
    }
    button {
      padding: 0 1.25rem;
      border-radius: 12px;
      border: none;
      background: #2f6feb;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>🧠 AI Chat by Jackson Weimer</header>
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="input" placeholder="Type a message..."></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    // 🔴 REPLACE THIS with your Render backend URL
    const BACKEND_URL = "https://your-app-name.onrender.com";

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const btn = document.getElementById("send");
    const history = [];

    // Greeting message on load
    window.addEventListener("load", () => {
      const greeting = "Hi, I'm Nova, your personal AI assistant for your school Chromebook. How can I help you?";
      addMsg("ai", greeting);
      history.push({ role: "assistant", content: greeting });
    });

    function addMsg(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role === "user" ? "user" : "ai"}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMsg("user", text);
      history.push({ role: "user", content: text });
      input.value = "";
      btn.disabled = true;

      const thinking = document.createElement("div");
      thinking.className = "msg ai";
      thinking.textContent = "Thinking...";
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch(`${BACKEND_URL}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        thinking.textContent = data.reply || data.error || "Something went wrong.";
        if (data.reply) history.push({ role: "assistant", content: data.reply });
      } catch {
        thinking.textContent = "Error reaching the server. Is your backend running?";
      }

      btn.disabled = false;
    }

    btn.addEventListener("click", sendMessage);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
  </script>
</body>
</html>
