<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova AI</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/UyC7wbr.png" />
  <link rel="apple-touch-icon" href="https://i.imgur.com/UyC7wbr.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nova AI" />
  <meta property="og:title" content="Nova AI" />
  <meta property="og:description" content="Nova AI — your personal AI assistant by Jackson Weimer." />
  <meta property="og:image" content="https://i.imgur.com/UyC7wbr.png" />
  <meta property="og:url" content="https://nova-ai-mk9x.onrender.com" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://i.imgur.com/UyC7wbr.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#2a2a2a; --border:#333; --text:#f0f0f0; --text-muted:#888; --accent:#2f6feb; --ai-bg:#1e1e1e; }
    .light { --bg:#ffffff; --surface:#ffffff; --surface2:#ececec; --border:#ddd; --text:#111; --text-muted:#666; --accent:#2f6feb; --ai-bg:#e8e8e8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; transition:background 0.2s,color 0.2s; }
    #auth-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .auth-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; width:100%; max-width:360px; display:flex; flex-direction:column; gap:1rem; }
    .auth-box h1 { font-size:1.4rem; text-align:center; }
    .auth-box p { font-size:0.85rem; color:var(--text-muted); text-align:center; }
    .auth-box input { padding:0.75rem; border-radius:10px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:1rem; font-family:'Inter',sans-serif; width:100%; }
    .auth-box button.primary { padding:0.75rem; border-radius:10px; border:none; background:var(--accent); color:white; font-size:1rem; cursor:pointer; width:100%; font-family:'Inter',sans-serif; }
    .auth-box button.primary:hover { opacity:0.9; }
    .auth-toggle { background:none; border:none; color:var(--accent); cursor:pointer; font-size:0.9rem; text-align:center; font-family:'Inter',sans-serif; }
    .auth-error { font-size:0.85rem; text-align:center; }
    #app { display:none; flex-direction:column; height:100vh; }
    header { padding:0.75rem 1rem; background:var(--surface); display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
    .header-title { font-size:1.1rem; font-weight:600; cursor:pointer; user-select:none; }
    .header-btns { display:flex; gap:0.5rem; }
    .icon-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:0.4rem 0.6rem; cursor:pointer; font-size:1rem; }
    .icon-btn:hover { opacity:0.8; }
    #chat { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:0.75rem; }
    .msg-wrap { display:flex; flex-direction:column; gap:0.25rem; }
    .msg-wrap.user { align-items:flex-end; }
    .msg-wrap.ai { align-items:flex-start; }
    .msg { max-width:75%; padding:0.75rem 1rem; border-radius:18px; line-height:1.5; white-space:pre-wrap; }
    .user .msg { background:var(--accent); color:white; border-bottom-right-radius:4px; }
    .ai .msg { background:var(--ai-bg); border:1px solid var(--border); border-bottom-left-radius:4px; }
    .msg img { max-width:100%; border-radius:10px; margin-top:0.5rem; display:block; }
    .msg-actions { display:flex; gap:0.4rem; }
    .msg-action-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.8rem; padding:0.2rem 0.4rem; border-radius:6px; }
    .msg-action-btn:hover { background:var(--surface2); color:var(--text); }
    #input-area { display:flex; flex-direction:column; padding:1rem; gap:0.5rem; background:var(--surface); border-top:1px solid var(--border); }
    #preview-area { display:none; align-items:center; gap:0.5rem; }
    #preview-area img { height:60px; border-radius:8px; border:1px solid var(--border); }
    #remove-img { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:50%; width:24px; height:24px; cursor:pointer; font-size:0.8rem; }
    #bottom-row { display:flex; gap:0.5rem; }
    textarea { flex:1; padding:0.75rem; border-radius:12px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:1rem; resize:none; height:52px; font-family:'Inter',sans-serif; }
    button { padding:0 1.25rem; border-radius:12px; border:none; background:var(--accent); color:white; font-size:1rem; cursor:pointer; }
    button:disabled { opacity:0.5; cursor:default; }
    .tool-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); font-size:1.2rem; padding:0 0.9rem; border-radius:12px; cursor:pointer; }
    .tool-btn:hover { opacity:0.8; }
    .tool-btn.recording { background:#e03; color:white; border-color:#e03; }
    #sidebar { position:fixed; top:0; left:-280px; width:280px; height:100%; background:var(--surface); border-right:1px solid var(--border); z-index:100; transition:left 0.25s; display:flex; flex-direction:column; }
    #sidebar.open { left:0; }
    #sidebar-header { padding:1rem; font-weight:600; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:0.5rem; }
    #clear-all-btn { background:#c0392b; border:none; color:white; border-radius:8px; padding:0.3rem 0.6rem; cursor:pointer; font-size:0.8rem; white-space:nowrap; }
    #clear-all-btn:hover { opacity:0.8; }
    #sidebar-list { flex:1; overflow-y:auto; padding:0.5rem; }
    .history-item { display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
    .history-item-title { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; padding:0.6rem 0.4rem; border-radius:8px; font-size:0.9rem; color:var(--text); }
    .history-item-title:hover { background:var(--surface2); }
    .delete-chat-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.9rem; padding:0.3rem 0.5rem; border-radius:6px; flex-shrink:0; }
    .delete-chat-btn:hover { background:#c0392b; color:white; }
    #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:99; }
    #overlay.show { display:block; }
    .cursor { display:inline-block; width:2px; height:1em; background:var(--text); margin-left:2px; animation:blink 0.7s infinite; vertical-align:text-bottom; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeout { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; width:100%; max-width:380px; display:flex; flex-direction:column; gap:1rem; }
    .modal-input { padding:0.75rem; border-radius:10px; border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:1rem; font-family:Inter,sans-serif; width:100%; }
    .modal-btn { padding:0.75rem; border-radius:10px; border:none; font-size:1rem; cursor:pointer; font-family:Inter,sans-serif; }
 
    /* 1. Default Theme Background */
    body {
      background: var(--bg) !important; 
      padding: 15px; 
    }
    /* 2. The Main Screen Border (Bends the whole app) */
    #app, #auth-screen {
      height: calc(100vh - 30px) !important;
      border-radius: 40px; /* Massive curved corners */
      
      /* Thick outer dome reflection */
      border-top: 4px solid rgba(255, 255, 255, 0.7) !important;
      border-left: 4px solid rgba(255, 255, 255, 0.3) !important;
      border-bottom: 4px solid rgba(0, 0, 0, 0.6) !important;
      border-right: 4px solid rgba(0, 0, 0, 0.2) !important;
      
      /* Main App Glass Base */
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.1)) !important;
      backdrop-filter: blur(15px) saturate(120%) !important;
      -webkit-backdrop-filter: blur(15px) saturate(120%) !important;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 10px 20px rgba(255,255,255,0.15) !important;
      overflow: hidden;
    }

    /* 3. Containers (Header, Input Area, Sidebar, Modals) */
    header, #input-area, #sidebar, .auth-box, .modal-box {
      background: 
        linear-gradient(125deg, rgba(255, 100, 200, 0.05) 0%, rgba(100, 220, 255, 0.05) 50%, rgba(255, 250, 100, 0.05) 100%),
        linear-gradient(to bottom right, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01)) !important;
      backdrop-filter: blur(30px) saturate(180%) contrast(120%) !important;
      -webkit-backdrop-filter: blur(30px) saturate(180%) contrast(120%) !important;
      border: none !important;
      border-top: 2px solid rgba(255, 255, 255, 0.4) !important;
      border-bottom: 2px solid rgba(0, 0, 0, 0.4) !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3) !important;
    }
    
    /* Fix layout overlapping for the new curves */
    header { border-radius: 40px 40px 0 0 !important; border-bottom: 2px solid rgba(0,0,0,0.5) !important; }
    #input-area { border-radius: 0 0 40px 40px !important; border-top: 2px solid rgba(255,255,255,0.4) !important; }
    #sidebar { border-radius: 40px 0 0 40px !important; border-right: 2px solid rgba(0,0,0,0.5) !important; }

    /* 4. Chat Bubbles */
    .msg {
      background: 
        linear-gradient(125deg, rgba(255, 100, 200, 0.08) 0%, rgba(100, 220, 255, 0.08) 50%, rgba(255, 250, 100, 0.08) 100%),
        linear-gradient(to bottom right, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.02)) !important;
      backdrop-filter: blur(25px) saturate(180%) contrast(120%) !important;
      -webkit-backdrop-filter: blur(25px) saturate(180%) contrast(120%) !important;
      
      border-top: 2px solid rgba(255, 255, 255, 0.7) !important;
      border-left: 2px solid rgba(255, 255, 255, 0.3) !important;
      border-bottom: 2px solid rgba(0, 0, 0, 0.4) !important;
      border-right: 2px solid rgba(0, 0, 0, 0.1) !important;
      
      box-shadow: inset 0 5px 10px rgba(255,255,255,0.2), 0 10px 20px rgba(0,0,0,0.3) !important;
      color: #ffffff !important;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6) !important;
    }
    
    /* Give User Messages a faint blue iridescent tint */
    .user .msg {
      background: 
        linear-gradient(125deg, rgba(47, 111, 235, 0.4) 0%, rgba(100, 220, 255, 0.1) 100%),
        linear-gradient(to bottom right, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05)) !important;
    }

    /* 5. ALL Buttons, Textareas, Inputs, and the Profile Widget Panel */
    button, .icon-btn, .tool-btn, .msg-action-btn, textarea, input, .history-item-title, .nova-glass-panel {
      background: 
        linear-gradient(125deg, rgba(255, 100, 200, 0.08) 0%, rgba(100, 220, 255, 0.08) 50%, rgba(255, 250, 100, 0.08) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.05) 100%) !important;
      
      backdrop-filter: blur(15px) saturate(150%) !important;
      -webkit-backdrop-filter: blur(15px) saturate(150%) !important;
      
      border-top: 2px solid rgba(255, 255, 255, 0.8) !important;
      border-left: 2px solid rgba(255, 255, 255, 0.4) !important;
      border-bottom: 2px solid rgba(0, 0, 0, 0.5) !important;
      border-right: 2px solid rgba(0, 0, 0, 0.2) !important;
      
      box-shadow: inset 0 4px 8px rgba(255, 255, 255, 0.4), inset 0 -4px 8px rgba(0, 0, 0, 0.3), 0 8px 15px rgba(0, 0, 0, 0.4) !important;
      
      color: #ffffff !important;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8) !important;
      border-radius: 16px !important;
      transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
    }

    /* 6. Button Hover Physics */
    button:hover, .icon-btn:hover, .tool-btn:hover, .msg-action-btn:hover, .history-item-title:hover {
      background: 
        linear-gradient(125deg, rgba(255, 100, 200, 0.12) 0%, rgba(100, 220, 255, 0.12) 50%, rgba(255, 250, 100, 0.12) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.15) 100%) !important;
      transform: translateY(-2px);
      box-shadow: inset 0 6px 12px rgba(255, 255, 255, 0.6), inset 0 -4px 8px rgba(0, 0, 0, 0.3), 0 12px 20px rgba(0, 0, 0, 0.5) !important;
    }
    button:active, .icon-btn:active, .tool-btn:active, .msg-action-btn:active {
      transform: translateY(1px) !important;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(0,0,0,0.4) !important;
      border-top: 2px solid rgba(255, 255, 255, 0.3) !important;
    }

    /* Fixes for text inputs so they look hollow inside */
    textarea, input {
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.5), 0 2px 5px rgba(255,255,255,0.1) !important;
      border-top: 2px solid rgba(0,0,0,0.4) !important;
      border-bottom: 2px solid rgba(255,255,255,0.4) !important;
    }
    ::placeholder { color: rgba(255, 255, 255, 0.5) !important; text-shadow: none !important; }

    /* Wipe out the old flat colors */
    :root { --surface: transparent !important; --surface2: transparent !important; --border: transparent !important; }
    
    /* 7. Light Mode Glass Text Override */
    .light .msg, 
    .light button, 
    .light .icon-btn, 
    .light .tool-btn, 
    .light .msg-action-btn, 
    .light textarea, 
    .light input, 
    .light .history-item-title, 
    .light .nova-glass-panel {
      color: #111111 !important; /* Turns the text black */
      text-shadow: 0 1px 3px rgba(255,255,255,0.9) !important; /* Changes shadow to white for readability */
    }

    .light ::placeholder { 
      color: rgba(0, 0, 0, 0.5) !important; 
    }
    
    /* 8. Light Mode Glass Structure Overrides */
    .light #app, .light #auth-screen {
      /* Turns the main app background into bright frosted glass */
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.2)) !important;
      box-shadow: 0 30px 60px rgba(0,0,0,0.1), inset 0 10px 20px rgba(255,255,255,0.8) !important;
      border-bottom: 4px solid rgba(0, 0, 0, 0.2) !important;
    }

    .light header, .light #input-area, .light #sidebar, .light .auth-box, .light .modal-box {
      /* Brightens all the structural boxes */
      background: linear-gradient(to bottom right, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.3)) !important;
      border-top: 2px solid rgba(255, 255, 255, 1) !important;
      border-bottom: 2px solid rgba(0, 0, 0, 0.1) !important;
    }
    
    .light .msg {
      /* Brightens the chat bubbles */
      background: linear-gradient(to bottom right, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4)) !important;
      border-top: 2px solid rgba(255,255,255,1) !important;
      border-bottom: 2px solid rgba(0,0,0,0.1) !important;
      box-shadow: inset 0 5px 10px #fff, 0 10px 20px rgba(0,0,0,0.05) !important;
    }
    
    .light .user .msg {
      /* Gives user messages a slight blue tint in light mode */
      background: linear-gradient(125deg, rgba(47, 111, 235, 0.15) 0%, rgba(100, 220, 255, 0.1) 100%),
                  linear-gradient(to bottom right, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.4)) !important;
    }
    
    /* 9. THE NUCLEAR LIGHT MODE BACKGROUND FIX */
    body.light {
      background-color: #ffffff !important;
      background-image: none !important;
    }
    
    /* 10. THE ABSOLUTE LIGHT MODE CANVAS FIX */
    html, body {
      transition: background 0.3s ease; /* Makes the switch smooth instead of a harsh flash */
    }

    /* When Light Mode is active, force the deepest layers to be pure white */
    html.light, body.light, .light {
      background-color: #ffffff !important;
      background-image: none !important;
    }

    /* 11. REMOVE WHITE BACKGROUND FROM PACMAN/DINO IN-BUTTON IMAGES */
    button img, .icon-btn img, .tool-btn img {
      mix-blend-mode: multiply;
      display: block;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h1>🌟 Nova AI</h1>
    <p id="auth-subtitle">Sign in to your account</p>
    <input type="text" id="auth-name" placeholder="Your name" style="display:none" />
    <input type="tel" id="auth-phone" placeholder="Phone number (optional)" style="display:none" />
    <input type="email" id="auth-email" placeholder="Email" />
    <input type="password" id="auth-password" placeholder="Password" />
    <p class="auth-error" id="auth-error"></p>
    <button class="primary" id="auth-submit">Sign In</button>
    <div style="display:flex;align-items:center;gap:0.5rem;margin:0.25rem 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="color:var(--text-muted);font-size:0.8rem">or</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>
    <button class="primary" id="discord-btn" style="background:#5865F2">🎮 Continue with Discord</button>
    <button class="primary" id="github-btn" style="background:#333">🐙 Continue with GitHub</button>
    <button class="auth-toggle" id="auth-toggle">Don't have an account? Sign up</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      💬 Chat History
      <div style="display:flex;gap:0.5rem;align-items:center">
        <button id="clear-all-btn">🗑️ Clear All</button>
        <button class="icon-btn" id="close-sidebar">✕</button>
      </div>
    </div>
    <div id="sidebar-list"></div>
  </div>
  <div id="overlay"></div>
  <header>
    <div style="display:flex;gap:0.5rem">
      <button class="icon-btn" id="history-btn" title="Chat history">💬</button>
      <button class="icon-btn" id="new-chat-btn" title="New chat">✏️</button>
    </div>
    <span class="header-title" id="header-title">🌟 Nova AI by Jackson Weimer</span>
    <div class="header-btns" id="header-btns">
      <button class="icon-btn" id="theme-btn" title="Toggle theme">🌙</button>
      <button class="icon-btn" id="clear-btn" title="Clear chat">🗑️</button>
      <button class="icon-btn" id="logout-btn" title="Log out">🚪</button>
      <button class="icon-btn" id="profile-btn" title="Profile" style="padding:0;overflow:hidden;width:34px;height:34px;">
        <img id="profile-icon" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:8px;" />
        <span id="profile-icon-fallback">👤</span>
      </button>
    </div>
  </header>
  <div id="chat"></div>
  <div id="input-area">
    <div id="preview-area">
      <img id="preview-img" alt="preview" />
      <button id="remove-img">✕</button>
    </div>
    <div id="bottom-row">
      <button class="tool-btn" id="upload-btn" title="Upload image">📎</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" />
      <button class="tool-btn" id="mic-btn" title="Voice input">🎤</button>
      <textarea id="input" placeholder="Type a message..."></textarea>
      <button id="send">Send</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="profile-modal">
  <div class="modal-box">
    <h2 style="font-size:1.2rem;font-weight:600">👤 Profile Settings</h2>
    
   <div id="profile-upload-section" class="nova-glass-panel" style="width: 100%; text-align: center; box-sizing: border-box;">
      <img id="profile-preview" src="https://via.placeholder.com/100" alt="Profile" width="100" height="100" style="display: block; margin: 0 auto 15px auto; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.4); background: var(--surface2);" />
      
      <label for="avatar-upload" class="glass-btn">✨ Update Photo</label>
      <input type="file" id="avatar-upload" accept="image/jpeg, image/png, image/webp, image/jpg" style="display:none;" />
    </div>
    <input type="text" id="profile-name" class="modal-input" placeholder="New name" />
    <input type="email" id="profile-email" class="modal-input" placeholder="New email" />
    <input type="password" id="profile-password" class="modal-input" placeholder="New password" />
    <p id="profile-msg" style="font-size:0.85rem;text-align:center;color:var(--text-muted)"></p>
    <div style="display:flex;gap:0.5rem">
      <button id="profile-save" class="modal-btn" style="flex:1;background:var(--accent);color:white">Save</button>
      <button id="profile-close" class="modal-btn" style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border)">Cancel</button>
    </div>
    <button id="profile-delete" class="modal-btn" style="width:100%;background:#c0392b;color:white">🗑️ Delete Account</button>
  </div>
</div>

<script>
  const BACKEND_URL = "https://nova-ai-mk9x.onrender.com";

  // Elements
  const authScreen = document.getElementById("auth-screen");
  const appEl = document.getElementById("app");
  const authName = document.getElementById("auth-name");
  const authPhone = document.getElementById("auth-phone");
  const authEmail = document.getElementById("auth-email");
  const authPassword = document.getElementById("auth-password");
  const authSubmit = document.getElementById("auth-submit");
  const authToggle = document.getElementById("auth-toggle");
  const authError = document.getElementById("auth-error");
  const authSubtitle = document.getElementById("auth-subtitle");
  const chatEl = document.getElementById("chat");
  const input = document.getElementById("input");
  const btn = document.getElementById("send");
  const fileInput = document.getElementById("file-input");
  const uploadBtn = document.getElementById("upload-btn");
  const previewArea = document.getElementById("preview-area");
  const previewImg = document.getElementById("preview-img");
  const removeImgBtn = document.getElementById("remove-img");
  const themeBtn = document.getElementById("theme-btn");
  const clearBtn = document.getElementById("clear-btn");
  const micBtn = document.getElementById("mic-btn");
  const historyBtn = document.getElementById("history-btn");
  const newChatBtn = document.getElementById("new-chat-btn");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const closeSidebarBtn = document.getElementById("close-sidebar");
  const sidebarList = document.getElementById("sidebar-list");
  const clearAllBtn = document.getElementById("clear-all-btn");
  const headerBtns = document.getElementById("header-btns");
  const headerTitle = document.getElementById("header-title");
  const logoutBtn = document.getElementById("logout-btn");
  const profileModal = document.getElementById("profile-modal");
  const profileBtn = document.getElementById("profile-btn");
  const profileClose = document.getElementById("profile-close");
  const profileSave = document.getElementById("profile-save");
  const profileDelete = document.getElementById("profile-delete");
  const profileMsg = document.getElementById("profile-msg");
  const avatarInput = document.getElementById("avatar-upload");
  const avatarPreview = document.getElementById("profile-preview");

  let history = [];
  let pendingImageBase64 = null;
  let pendingImageType = null;
  let pendingAvatarBase64 = null;
  let isLight = false;
  let recognition = null;
  let isRecording = false;
  let currentChatId = Date.now().toString();
  let userToken = localStorage.getItem("nova_token") || null;
  let isSignUp = false;

  // Keep Render awake
  setInterval(() => fetch(`${BACKEND_URL}/`), 10 * 60 * 1000);

  // Toast
  function showToast(msg) {
    const toast = document.createElement("div");
    toast.style.cssText = "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2f6feb;color:white;padding:0.6rem 1.2rem;border-radius:12px;font-size:0.9rem;z-index:9999;animation:fadeout 0.3s ease 2.7s forwards";
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // Token refresh
  async function refreshToken() {
    const storedRefresh = localStorage.getItem("nova_refresh_token");
    if (!storedRefresh) return;
    try {
      const res = await fetch(`${BACKEND_URL}/auth/refresh`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: storedRefresh }),
      });
      const data = await res.json();
      if (data.session) {
        userToken = data.session.access_token;
        localStorage.setItem("nova_token", userToken);
        localStorage.setItem("nova_refresh_token", data.session.refresh_token);
      } else { showAuth(); }
    } catch { console.error("Token refresh failed"); }
  }
  setInterval(refreshToken, 10 * 60 * 1000);

  // Auth
  document.getElementById("discord-btn").addEventListener("click", () => { window.location.href = `${BACKEND_URL}/auth/oauth/discord`; });
  document.getElementById("github-btn").addEventListener("click", () => { window.location.href = `${BACKEND_URL}/auth/oauth/github`; });

  authToggle.addEventListener("click", () => {
    isSignUp = !isSignUp;
    authName.style.display = isSignUp ? "block" : "none";
    authPhone.style.display = isSignUp ? "block" : "none";
    authSubtitle.textContent = isSignUp ? "Create an account" : "Sign in to your account";
    authSubmit.textContent = isSignUp ? "Sign Up" : "Sign In";
    authToggle.textContent = isSignUp ? "Already have an account? Sign in" : "Don't have an account? Sign up";
    authError.textContent = "";
  });

  authSubmit.addEventListener("click", async () => {
    const email = authEmail.value.trim();
    const password = authPassword.value.trim();
    const name = authName.value.trim();
    const phone = authPhone.value.trim();
    if (!email || !password || (isSignUp && !name)) { authError.textContent = "Please fill in all fields."; return; }
    authSubmit.disabled = true; authSubmit.textContent = "Loading...";
    try {
      const res = await fetch(`${BACKEND_URL}${isSignUp ? "/auth/signup" : "/auth/login"}`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password, name, phone }),
      });
      const data = await res.json();
      if (data.error) { authError.textContent = data.error; authSubmit.disabled = false; authSubmit.textContent = isSignUp ? "Sign Up" : "Sign In"; return; }
      userToken = data.session.access_token;
      localStorage.setItem("nova_token", userToken);
      localStorage.setItem("nova_refresh_token", data.session.refresh_token);
      localStorage.setItem("nova_name", data.user?.user_metadata?.name || name || "");
      showApp();
    } catch { authError.textContent = "Something went wrong. Try again."; authSubmit.disabled = false; authSubmit.textContent = isSignUp ? "Sign Up" : "Sign In"; }
  });

  async function showApp() {
    authScreen.style.display = "none";
    appEl.style.display = "flex";
    await refreshToken();
    if (history.length === 0) addGreeting();
    loadChats();
  }

  function showAuth() {
    appEl.style.display = "none";
    authScreen.style.display = "flex";
    userToken = null;
    localStorage.removeItem("nova_token");
    localStorage.removeItem("nova_refresh_token");
  }

  if (userToken) showApp();

  // Profile
  function updateProfileIcon(src) {
    const icon = document.getElementById("profile-icon");
    const fallback = document.getElementById("profile-icon-fallback");
    if (src) { icon.src = src; icon.style.display = "block"; fallback.style.display = "none"; }
    else { icon.style.display = "none"; fallback.style.display = "block"; }
  }
  const savedAvatar = localStorage.getItem("nova_avatar");
  if (savedAvatar) updateProfileIcon(savedAvatar);

  profileBtn.addEventListener("click", () => {
    document.getElementById("profile-name").value = localStorage.getItem("nova_name") || "";
    document.getElementById("profile-email").value = "";
    document.getElementById("profile-password").value = "";
    profileMsg.textContent = "";
    profileModal.classList.add("open");
  });
  profileClose.addEventListener("click", () => { profileModal.classList.remove("open"); });
  profileModal.addEventListener("click", (e) => { if (e.target === profileModal) profileModal.classList.remove("open"); });

  profileSave.addEventListener("click", async () => {
    const name = document.getElementById("profile-name").value.trim();
    const email = document.getElementById("profile-email").value.trim();
    const password = document.getElementById("profile-password").value.trim();
    profileSave.disabled = true; profileSave.textContent = "Saving...";
    try {
      const res = await fetch(`${BACKEND_URL}/auth/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${userToken}` },
        body: JSON.stringify({ name: name || undefined, email: email || undefined, password: password || undefined, avatar_url: pendingAvatarBase64 || undefined }),
      });
      const data = await res.json();
      if (data.error) { profileMsg.style.color = "#e74c3c"; profileMsg.textContent = data.error; }
      else {
        if (name) localStorage.setItem("nova_name", name);
        if (pendingAvatarBase64) { localStorage.setItem("nova_avatar", pendingAvatarBase64); updateProfileIcon(pendingAvatarBase64); }
        profileMsg.style.color = "#2ecc71"; profileMsg.textContent = "Saved!";
        setTimeout(() => { profileModal.classList.remove("open"); profileMsg.textContent = ""; }, 1500);
      }
    } catch { profileMsg.style.color = "#e74c3c"; profileMsg.textContent = "Something went wrong."; }
    profileSave.disabled = false; profileSave.textContent = "Save";
  });

  profileDelete.addEventListener("click", async () => {
    if (!confirm("Are you sure you want to delete your account? This can't be undone!")) return;
    if (!confirm("Last chance — all your chats will be permanently deleted too. Continue?")) return;
    try {
      const res = await fetch(`${BACKEND_URL}/auth/delete`, { method: "DELETE", headers: { "Authorization": `Bearer ${userToken}` } });
      const data = await res.json();
      if (data.error) { alert("Error: " + data.error); return; }
      localStorage.clear(); showAuth();
    } catch { alert("Something went wrong. Try again."); }
  });

  // Logout
  logoutBtn.addEventListener("click", () => { if (!confirm("Log out?")) return; showAuth(); });

 // Theme Toggle
  themeBtn.addEventListener("click", (e) => {
    e.preventDefault();
    
    isLight = !isLight;
    document.body.classList.toggle("light", isLight);
    document.documentElement.classList.toggle("light", isLight);
    themeBtn.textContent = isLight ? "☀️" : "🌙";
    
    localStorage.setItem("theme", isLight ? "light" : "dark");
    
    applyEaster();
  });

  // New / Clear chat
  newChatBtn.addEventListener("click", () => { saveCurrentChat(); history = []; chatEl.innerHTML = ""; currentChatId = Date.now().toString(); addGreeting(); });
  clearBtn.addEventListener("click", () => { saveCurrentChat(); history = []; chatEl.innerHTML = ""; currentChatId = Date.now().toString(); addGreeting(); });

  // Clear all chats
  clearAllBtn.addEventListener("click", async () => {
    if (!confirm("Delete all chat history? This can't be undone.")) return;
    await fetch(`${BACKEND_URL}/chats`, { method: "DELETE", headers: { "Authorization": `Bearer ${userToken}` } });
    renderSidebar([]);
  });

  // Sidebar
  historyBtn.addEventListener("click", async () => { await saveCurrentChat(); await loadChats(); });
</script>
</body>
</html>
